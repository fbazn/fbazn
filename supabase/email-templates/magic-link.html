<!doctype html>
<html>
  <body style="margin:0;background:#080c18;color:#f0f4ff;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#080c18;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:620px;border:1px solid #1e2d4a;background:#0e1425;">
            <tr>
              <td style="height:8px;background:repeating-linear-gradient(-45deg,#f59e0b 0,#f59e0b 12px,#1a1a1a 12px,#1a1a1a 24px);"></td>
            </tr>
            <tr>
              <td style="padding:34px 32px 10px;">
                <div style="font-size:24px;font-weight:900;letter-spacing:2px;color:#fff;">FB<span style="color:#6366f1;">AZN</span></div>
                <p style="margin:28px 0 10px;color:#f59e0b;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;">Magic link</p>
                <h1 style="margin:0;color:#fff;font-size:38px;line-height:1;font-weight:900;text-transform:uppercase;">Sign in to FBAZN.</h1>
                <p style="margin:22px 0 0;color:#8b9cc8;font-size:16px;line-height:1.65;">Use this one-time link to access your Amazon FBA sourcing workspace.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:22px 32px;">
                <a href="https://app.fbazn.com/auth/confirm?token_hash={{ .TokenHash }}&type=magiclink&redirect_to={{ .RedirectTo | urlquery }}" style="display:inline-block;background:#6366f1;color:#fff;text-decoration:none;font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:15px 24px;">Sign in</a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 34px;">
                <p style="margin:0;color:#4a5a80;font-size:13px;line-height:1.6;">This sign-in link expires soon and can only be used once.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
